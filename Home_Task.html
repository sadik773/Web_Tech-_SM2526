<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Booking Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(rgba(0,0,0,0.5),
               rgba(0,0,0,0.5)),
               url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:800px;
    background:rgba(255,255,255,0.95);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.header{
    background:linear-gradient(90deg,#ff512f,#f09819);
    color:white;
    text-align:center;
    padding:30px;
}

.header h1{
    font-size:35px;
}

.form-area{
    padding:35px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.input-box{
    flex:1;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.input-box input,
.input-box select,
.input-box textarea{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:15px;
}

.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus{
    outline:none;
    border-color:#ff512f;
}

.checkbox{
    margin-top:15px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff512f,#f09819);
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>✈ Travel Booking Form</h1>
        <p>Book your dream vacation today!</p>
    </div>

    <div class="form-area">

        <form>

            <div class="row">
                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="john@gmail.com">
                </div>
            </div>

            <div class="row">
                <div class="input-box">
                    <label>Destination</label>
                    <select>
                        <option>Choose Destination</option>
                        <option>Paris</option>
                        <option>Dubai</option>
                        <option>Maldives</option>
                        <option>Singapore</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Number of Travelers</label>
                    <input type="number">
                </div>
            </div>

            <div class="row">
                <div class="input-box">
                    <label>Departure Date</label>
                    <input type="date">
                </div>

                <div class="input-box">
                    <label>Return Date</label>
                    <input type="date">
                </div>
            </div>

            <div class="input-box">
                <label>Special Requirements</label>
                <textarea rows="4"
                placeholder="Any special requests..."></textarea>
            </div>

            <div class="checkbox">
                <input type="checkbox"> I agree to the terms and conditions.
            </div>

            <button class="btn">
                🌍 Book Now
            </button>

        </form>

    </div>

</div>

</body>
</html>
